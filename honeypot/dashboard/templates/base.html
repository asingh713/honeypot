<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Honeypot Dashboard{% endblock %}</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #c9d1d9;
      --muted:    #8b949e;
      --green:    #3fb950;
      --red:      #f85149;
      --yellow:   #d29922;
      --blue:     #58a6ff;
      --orange:   #d18616;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 52px;
      gap: 24px;
    }
    nav .brand { font-weight: 700; font-size: 16px; color: var(--red); letter-spacing: 1px; }
    nav a { color: var(--muted); font-size: 13px; }
    nav a:hover, nav a.active { color: var(--text); text-decoration: none; }

    /* Layout */
    main { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
    }
    .card h3 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .card .value { font-size: 32px; font-weight: 700; }

    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
    @media (max-width: 800px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-2 { grid-template-columns: 1fr; } }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 600; }
    td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-family: monospace; }
    tr:hover td { background: rgba(255,255,255,.03); }

    /* Badges */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
    }
    .badge-ssh    { background: rgba(88,166,255,.15); color: var(--blue); }
    .badge-http   { background: rgba(63,185,80,.15);  color: var(--green); }
    .badge-telnet { background: rgba(210,153,34,.15); color: var(--yellow); }

    /* Pagination */
    .pagination { display: flex; gap: 8px; margin-top: 16px; align-items: center; }
    .pagination a { padding: 4px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text); }
    .pagination a:hover { border-color: var(--blue); text-decoration: none; }
    .pagination .current { padding: 4px 12px; color: var(--muted); }

    /* Page header */
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-size: 20px; font-weight: 700; }
    .page-header p  { color: var(--muted); margin-top: 4px; font-size: 13px; }

    /* Section header */
    .section-header { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text); }

    /* Top list */
    .top-list { list-style: none; }
    .top-list li { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-family: monospace; font-size: 13px; }
    .top-list li:last-child { border-bottom: none; }
    .top-list .count { color: var(--muted); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <span class="brand">&#9762; HONEYPOT</span>
    <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Overview</a>
    <a href="/events" {% if request.path.startswith('/events') %}class="active"{% endif %}>Events</a>
    <a href="/map" {% if request.path == '/map' %}class="active"{% endif %}>Map</a>
    <a href="/api/stats" style="margin-left:auto; font-size:12px;">API</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
